name: EA E2E Tests

on:
  workflow_dispatch:
  schedule:
    # Every Monday at 08:00 BDT (UTC+6) = 02:00 UTC
    - cron: "0 2 * * 1"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    env:
      EA_PLUGINS_PATH: ${{ github.workspace }}/ea-plugins
      BASE_URL: http://localhost:8888
      WP_URL: http://localhost:8888
      WP_PORT: 8888
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
      WP_ADMIN_USER: admin
      WP_ADMIN_PASSWORD: admin123
      WP_ADMIN_EMAIL: admin@example.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Fetch EA plugins ─────────────────────────────────────────────────────

      - name: Fetch EA Free plugin
        run: |
          git clone \
            https://x-access-token:${{ secrets.PLUGIN_REPO_TOKEN }}@github.com/WPDevelopers/essential-addons-for-elementor-lite.git \
            ea-plugins/essential-addons-for-elementor-lite

      - name: Fetch EA Pro plugin
        run: |
          git clone \
            https://x-access-token:${{ secrets.PLUGIN_REPO_TOKEN }}@github.com/WPDevelopers/essential-addons-elementor.git \
            ea-plugins/essential-addons-elementor

      # ── WordPress environment ────────────────────────────────────────────────

      - name: Start Docker services
        run: docker compose up -d db wordpress

      - name: Wait for WordPress
        run: bash scripts/wait-for-wordpress.sh

      - name: Configure WordPress via WP-CLI
        run: docker compose run --rm wpcli bash /scripts/configure-wordpress.sh

      - name: Seed test pages
        run: docker compose run --rm wpcli bash /scripts/setup-test-pages.sh

      # ── Node / Playwright ────────────────────────────────────────────────────

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system deps (cached hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # ── Run tests ────────────────────────────────────────────────────────────

      - name: Run E2E tests
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
        run: npm test

      # ── Publish report to GitHub Pages ───────────────────────────────────────

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/

      - name: Deploy to GitHub Pages
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4

      # ── Failure artifacts ────────────────────────────────────────────────────

      - name: Upload failure artifacts (screenshots & videos)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
