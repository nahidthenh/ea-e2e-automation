name: Update Visual Snapshots

on:
  workflow_dispatch:
    inputs:
      free_branch:
        description: "EA Free plugin branch"
        required: false
        default: "master"
        type: string
      pro_branch:
        description: "EA Pro plugin branch"
        required: false
        default: "master"
        type: string

permissions:
  contents: write

jobs:
  update-snapshots:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      EA_PLUGINS_PATH: ${{ github.workspace }}/ea-plugins
      BASE_URL: http://localhost:8888
      WP_URL: http://localhost:8888
      WP_PORT: 8888
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
      WP_ADMIN_USER: admin
      WP_ADMIN_PASSWORD: admin123
      WP_ADMIN_EMAIL: admin@example.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch EA Free plugin (${{ inputs.free_branch || 'master' }})
        run: |
          git clone --branch ${{ inputs.free_branch || 'master' }} --single-branch \
            https://x-access-token:${{ secrets.PLUGIN_REPO_TOKEN }}@github.com/WPDevelopers/essential-addons-for-elementor-lite.git \
            ea-plugins/essential-addons-for-elementor-lite

      - name: Fetch EA Pro plugin (${{ inputs.pro_branch || 'master' }})
        run: |
          git clone --branch ${{ inputs.pro_branch || 'master' }} --single-branch \
            https://x-access-token:${{ secrets.PLUGIN_REPO_TOKEN }}@github.com/WPDevelopers/essential-addons-elementor.git \
            ea-plugins/essential-addons-elementor

      - name: Start Docker services
        run: docker compose up -d db wordpress

      - name: Wait for WordPress
        run: bash scripts/wait-for-wordpress.sh

      - name: Configure WordPress via WP-CLI
        run: docker compose run --rm wpcli bash /scripts/configure-wordpress.sh

      - name: Seed sample data (products & posts)
        run: docker compose run --rm wpcli bash /scripts/setup-sample-data.sh

      - name: Seed test pages
        run: docker compose run --rm wpcli bash /scripts/setup-test-pages.sh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Update snapshots
        run: npx playwright test --project=chromium --update-snapshots
        continue-on-error: true

      - name: Commit updated snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/**-snapshots/
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
          else
            git commit -m "chore: update visual snapshots for Linux (chromium)"
            git push
          fi
